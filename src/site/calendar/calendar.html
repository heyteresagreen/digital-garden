<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Printer Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
    --paper-width: 148mm;
    --paper-height: 105mm;
    --paper-padding: 4mm;
    --month-gap-row: 0mm;
    --month-gap-col: 5mm;
    --date-font-size: 7.5pt;
    --day-name-size: 5pt;
    --month-title-size: 6.5pt;
    --month-color: #000000;
    --cell-height: 4.5mm;
    --orientation: portrait;
    --grid-display: none;
    --grid-color: rgba(0,0,0,0.15);
    --zoom-level: 1;
    --month-giant-size: 0pt;

    --accent: #2d6147;
    --accent-light: #e0ece6;
    --accent-hover: #235038;
    --input-bg: #eeebe4;
    --border: #dad6cc;
    --label: #8a8278;
    --text: #282420;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #e5e1d8;
    user-select: none;
}

/* ─── App shell ─── */
.app {
    display: grid;
    grid-template-columns: 264px 1fr;
    height: 100vh;
}

/* ─── Sidebar ─── */
.sidebar {
    width: 264px;
    background: #f8f5f0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
}

.sidebar-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 18px 20px 16px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
    flex-shrink: 0;
}

.sidebar-title-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
}

/* ─── Sections ─── */
.prop-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
}

.prop-section-head {
    font-size: 11px;
    font-weight: 700;
    color: #b0a898;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 12px;
}

/* ─── Property rows ─── */
.prop-row {
    display: grid;
    grid-template-columns: 88px 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.prop-row:last-child { margin-bottom: 0; }

.prop-label {
    font-size: 12px;
    color: var(--label);
}

/* ─── Inputs ─── */
.sidebar input[type="number"],
.sidebar select {
    background: var(--input-bg);
    border: 1.5px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    padding: 0 10px;
    height: 32px;
    width: 100%;
    font-family: inherit;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
}

.sidebar input[type="number"]::-webkit-inner-spin-button,
.sidebar input[type="number"]::-webkit-outer-spin-button { opacity: 0.5; }

.sidebar input[type="number"]:focus,
.sidebar select:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
}

.sidebar select { cursor: pointer; }

.sidebar input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
    margin: 0;
    justify-self: start;
    border-radius: 4px;
}

.sidebar input[type="color"] {
    width: 40px;
    height: 28px;
    padding: 1px 3px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    cursor: pointer;
    justify-self: start;
}

/* ─── Paired inputs ─── */
.prop-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}

/* ─── Segmented control ─── */
.seg-ctrl {
    display: flex;
    background: var(--input-bg);
    border-radius: 8px;
    padding: 3px;
    height: 32px;
    gap: 2px;
}

.seg-ctrl button {
    flex: 1;
    background: none;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    color: var(--label);
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
}

.seg-ctrl button.active {
    background: #fff;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.04);
}

.seg-ctrl button:hover:not(.active) { color: var(--text); }

/* ─── Color swatches ─── */
.prop-swatches {
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    margin: 10px 0 2px;
}

body[data-active-mode="highlight"] .prop-swatches { display: flex; }

.swatch {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
}

.swatch:hover { transform: scale(1.1); }

.swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
}

/* ─── Date textarea ─── */
.prop-dates { margin-top: 10px; }

.prop-dates-label {
    display: block;
    font-size: 12px;
    color: var(--label);
    margin-bottom: 6px;
}

#dateInput {
    width: 100%;
    min-height: 80px;
    background: var(--input-bg);
    border: 1.5px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 8px 10px;
    resize: vertical;
    line-height: 1.6;
    transition: border-color 0.15s;
}

#dateInput:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
}

#dateInput::placeholder { color: #c0b8ae; }
#dateInput.has-errors { border-color: #dc2626; }

/* ─── Reset link ─── */
.link-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    font-weight: 500;
}

.link-btn:hover { color: var(--accent-hover); text-decoration: underline; }

/* ─── Actions ─── */
.sidebar-actions {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: auto;
    flex-shrink: 0;
}

.action-btn {
    width: 100%;
    height: 36px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity 0.12s, transform 0.1s;
}

.action-btn:active { transform: scale(0.98); }

.action-btn--primary {
    background: var(--accent);
    color: #fff;
}

.action-btn--primary:hover { background: var(--accent-hover); }

.action-btn--secondary {
    background: var(--input-bg);
    color: var(--text);
    font-weight: 500;
}

.action-btn--secondary:hover { background: #e4e0d8; }

.action-btn--danger {
    background: none;
    color: #dc2626;
    font-weight: 500;
    font-size: 12px;
    height: 28px;
}

.action-btn--danger:hover { color: #b91c1c; }

/* ─── Mobile hamburger ─── */
.hamburger {
    display: none;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
}

/* ─── Preview area ─── */
.preview-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #e5e1d8;
}

.preview-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    padding: 10px 16px;
    background: #f8f5f0;
    border-bottom: 1px solid var(--border);
}

.preview-controls button {
    padding: 5px 12px;
    background: var(--input-bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    font-family: inherit;
    font-weight: 500;
    transition: background 0.12s;
}

.preview-controls button:hover { background: #e4e0d8; }

.preview-controls span {
    font-size: 12px;
    color: var(--label);
    min-width: 38px;
    text-align: center;
}

.preview-scroll {
    flex: 1;
    overflow: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px;
    position: relative;
}

/* ─── Calendar page ─── */
.page {
    width: var(--paper-width);
    height: var(--paper-height);
    min-width: var(--paper-width);
    min-height: var(--paper-height);
    background: white;
    padding: var(--paper-padding);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.06);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    transform: scale(var(--zoom-level));
    transform-origin: top center;
    transition: transform 0.2s ease;
}

#yearTitleHeader {
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    margin-bottom: 5mm;
    display: none;
}

.months-grid {
    display: grid;
    flex-grow: 1;
}

/* Layouts */
body[data-layout="landscape"] .months-grid {
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: var(--month-gap-row) var(--month-gap-col);
}

body[data-layout="portrait"] .months-grid {
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: var(--month-gap-row) var(--month-gap-col);
}

body[data-layout="folded"] .months-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1mm 1fr 1fr;
    grid-template-rows: repeat(3, 1fr);
    column-gap: var(--month-gap-col);
    row-gap: var(--month-gap-row);
}

body[data-layout="folded"] .month:nth-child(1)  { grid-column: 1; grid-row: 1; }
body[data-layout="folded"] .month:nth-child(2)  { grid-column: 2; grid-row: 1; }
body[data-layout="folded"] .month:nth-child(3)  { grid-column: 1; grid-row: 2; }
body[data-layout="folded"] .month:nth-child(4)  { grid-column: 2; grid-row: 2; }
body[data-layout="folded"] .month:nth-child(5)  { grid-column: 1; grid-row: 3; }
body[data-layout="folded"] .month:nth-child(6)  { grid-column: 2; grid-row: 3; }
body[data-layout="folded"] .month:nth-child(7)  { grid-column: 4; grid-row: 1; }
body[data-layout="folded"] .month:nth-child(8)  { grid-column: 5; grid-row: 1; }
body[data-layout="folded"] .month:nth-child(9)  { grid-column: 4; grid-row: 2; }
body[data-layout="folded"] .month:nth-child(10) { grid-column: 5; grid-row: 2; }
body[data-layout="folded"] .month:nth-child(11) { grid-column: 4; grid-row: 3; }
body[data-layout="folded"] .month:nth-child(12) { grid-column: 5; grid-row: 3; }

/* ─── Month view layout ─── */
body[data-view="month"] .months-grid {
    display: flex;
    flex-direction: column;
}

body[data-view="month"] .month {
    display: flex;
    flex-direction: column;
    flex: 1;
}

body[data-view="month"] .month h3 { display: none; }

body[data-view="month"] table { flex: 1; }

/* Date number top-left in month view */
body[data-view="month"] td span {
    align-items: flex-start;
    justify-content: flex-start;
    padding: 0.8mm 1mm;
}

/* Overflow (adjacent month) dates */
.overflow-date span { color: #bbb; }
body[data-view="month"] .overflow-date span { color: rgba(0,0,0,0.18); }

/* ─── Month view editorial header ─── */
.mvh {
    display: flex;
    align-items: flex-start;
    flex-shrink: 0;
    margin-bottom: 2.5mm;
    overflow: hidden;
}

.mvh-name {
    flex: 1;
    font-size: var(--month-giant-size);
    font-weight: 900;
    line-height: 0.85;
    color: var(--month-color);
    text-transform: uppercase;
    letter-spacing: -0.03em;
    min-width: 0;
    overflow: hidden;
}

.mvh-side {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1.5mm;
    padding-left: 3mm;
}

.mvh-year-text {
    font-size: calc(var(--month-giant-size) * 0.35);
    font-weight: 900;
    color: var(--month-color);
    opacity: 0.28;
    line-height: 0.9;
    text-align: right;
}

/* Month-only sidebar section */
.month-only-section { display: none; }
body[data-view="month"] .month-only-section { display: block; }

/* ─── Preview side nav buttons ─── */
.preview-nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.92);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    color: var(--text);
    display: none;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    padding: 0;
    transition: background 0.12s, box-shadow 0.12s;
}

.preview-nav-btn:hover { background: white; box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
.preview-nav-btn--left  { left: 16px; }
.preview-nav-btn--right { right: 16px; }
body[data-view="month"] .preview-nav-btn { display: flex; }

.month h3 {
    margin: 0 0 1mm;
    font-size: var(--month-title-size);
    color: var(--month-color);
    text-align: center;
    text-transform: uppercase;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

th { font-weight: normal; font-size: var(--day-name-size); color: #888; text-align: center; }

td {
    height: var(--cell-height);
    padding: 0.5mm 0;
    font-size: var(--date-font-size);
    text-align: center;
    border: var(--grid-display);
    touch-action: none;
}

td span {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: var(--date-font-size);
    line-height: 1;
    pointer-events: none;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
}

/* Export-only */
body.is-capturing td span {
    display: block;
    text-align: center;
    line-height: 1 !important;
    padding-top: calc(((var(--cell-height) - var(--date-font-size)) / 2) - (var(--date-font-size) * 0.3));
}

/* Highlight styles */
.highlight-yellow span { background: #fff59d; }
.highlight-blue   span { background: #cde8ff; }
.highlight-pink   span { background: #ffd6e8; }
.highlight-green  span { background: #d4ed91; }
.highlight-grey   span { background: #e0e0e0; }
.highlight-black  span { background: #000; color: #fff; }
.outline span { border: 0.5pt solid #555; }
.outline.round-left  span { border-right: none; }
.outline.round-right span { border-left: none; }
.outline:not(.round-all):not(.round-left):not(.round-right) span { border-left: none; border-right: none; }

.round-left  span { border-top-left-radius: 99px;  border-bottom-left-radius: 99px; }
.round-right span { border-top-right-radius: 99px; border-bottom-right-radius: 99px; }
.round-all   span { border-radius: 99px; }

/* Cursors */
body[data-active-mode="highlight"][data-highlight-color="yellow"] td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%23FFC940"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%23FFC940"/></g></svg>') 7 7, pointer; }
body[data-active-mode="highlight"][data-highlight-color="blue"]   td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%2380C4FF"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%2380C4FF"/></g></svg>') 7 7, pointer; }
body[data-active-mode="highlight"][data-highlight-color="pink"]   td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%23FFB3D9"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%23FFB3D9"/></g></svg>') 7 7, pointer; }
body[data-active-mode="highlight"][data-highlight-color="green"]  td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%23D4ED91"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%23D4ED91"/></g></svg>') 7 7, pointer; }
body[data-active-mode="highlight"][data-highlight-color="grey"]   td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%23B0B0B0"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%23B0B0B0"/></g></svg>') 7 7, pointer; }
body[data-active-mode="highlight"][data-highlight-color="black"]  td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%23505050"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%23505050"/></g></svg>') 7 7, pointer; }
body[data-active-mode="outline"] td { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><g transform="rotate(135 16 16)"><rect x="10" y="4" width="6" height="16" rx="3" fill="%23505050"/><path d="M10 19 Q10 20 11 21 L11 23 Q11 24 13 24 Q15 24 15 23 L15 21 Q16 20 16 19 Z" fill="%232C2C2C"/><polygon points="11,23 13,28 15,23" fill="%23505050"/></g></svg>') 7 7, pointer; }

/* ─── Mobile ─── */
@media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }

    .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        bottom: 0;
        width: 264px;
        z-index: 1000;
        transition: left 0.3s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
    }

    .sidebar.open { left: 0; }

    .hamburger {
        display: block;
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 999;
        background: #f8f5f0;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .preview-controls { padding-left: 56px; }
}

/* ─── Print ─── */
@media print {
    @page {
        size: var(--orientation);
        margin: 0;
    }

    body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    .sidebar, .preview-controls, .hamburger {
        display: none !important;
    }

    .app, .preview-area, .preview-scroll {
        display: block !important;
        overflow: visible !important;
        background: transparent !important;
        border: none !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    .page {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        transform: scale(1) !important;
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
    }

    /* Multi-page month print */
    body.print-all-months #captureTarget { display: none !important; }
    body.print-all-months .preview-nav-btn { display: none !important; }
    body.print-all-months .month-print-page {
        display: flex !important;
        position: relative !important;
        top: auto !important;
        left: auto !important;
        page-break-before: always;
        box-shadow: none !important;
        border-radius: 0 !important;
        transform: scale(1) !important;
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
    }
    body.print-all-months .month-print-page:first-child { page-break-before: auto; }
}
</style>
</head>
<body data-paper="A6" data-layout="portrait" data-view="year">

<button class="hamburger" onclick="toggleSidebar()">☰</button>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-title">
            <span class="sidebar-title-dot"></span>
            Calendar Printer
        </div>

        <!-- Basic -->
        <div class="prop-section">
            <div class="prop-section-head">Basic</div>
            <div class="prop-row">
                <span class="prop-label">Year</span>
                <input type="number" id="year" value="2026" oninput="applyAdvanced()">
            </div>
            <div class="prop-row">
                <span class="prop-label">Month labels</span>
                <select id="monthFormat" onchange="applyAdvanced()">
                    <option value="short">3 letters (JAN)</option>
                    <option value="long">Full name</option>
                </select>
            </div>
            <div class="prop-row">
                <span class="prop-label">Year title</span>
                <input type="checkbox" id="showYearTitle" onchange="applyAdvanced()">
            </div>
            <div class="prop-row">
                <span class="prop-label">Day grid</span>
                <input type="checkbox" id="showDayOutlines" onchange="applyAdvanced()">
            </div>
        </div>

        <!-- Layout -->
        <div class="prop-section">
            <div class="prop-section-head">Layout</div>
            <div class="prop-row">
                <span class="prop-label">View</span>
                <div class="seg-ctrl">
                    <button onclick="setViewMode('year')" class="active" id="btnViewYear">Year</button>
                    <button onclick="setViewMode('month')" id="btnViewMonth">Month</button>
                </div>
            </div>
            <div class="prop-row">
                <span class="prop-label">Paper size</span>
                <select id="sizeSelect" onchange="updateDimensions()">
                    <option value="A4">A4</option>
                    <option value="A5">A5</option>
                    <option value="A6" selected>A6</option>
                    <option value="Square">Square</option>
                </select>
            </div>
            <div class="prop-row">
                <span class="prop-label">Orientation</span>
                <select id="layoutSelect" onchange="updateDimensions()">
                    <option value="portrait" selected>Portrait</option>
                    <option value="landscape">Landscape</option>
                    <option value="folded" id="optFolded">Folded</option>
                </select>
            </div>
            <div class="prop-row">
                <span class="prop-label">Week starts</span>
                <div class="seg-ctrl">
                    <button onclick="setWeekStart(1)" class="active" id="btnMon">Monday</button>
                    <button onclick="setWeekStart(0)" id="btnSun">Sunday</button>
                </div>
            </div>
        </div>

        <!-- Highlighting -->
        <div class="prop-section">
            <div class="prop-section-head">Highlighting</div>
            <div class="prop-row">
                <span class="prop-label">Draw mode</span>
                <div class="seg-ctrl">
                    <button onclick="setDrawMode('highlight')" id="btnHighlight">Fill</button>
                    <button onclick="setDrawMode('outline')" id="btnOutline">Outline</button>
                </div>
            </div>

            <div id="colorContainer" class="prop-swatches">
                <button class="swatch active" style="background:#fff59d" onclick="setHighlightColor('yellow')" data-color="yellow" title="Yellow"></button>
                <button class="swatch" style="background:#cde8ff"  onclick="setHighlightColor('blue')"   data-color="blue"   title="Blue"></button>
                <button class="swatch" style="background:#ffd6e8"  onclick="setHighlightColor('pink')"   data-color="pink"   title="Pink"></button>
                <button class="swatch" style="background:#d4ed91"  onclick="setHighlightColor('green')"  data-color="green"  title="Green"></button>
                <button class="swatch" style="background:#e0e0e0"  onclick="setHighlightColor('grey')"   data-color="grey"   title="Grey"></button>
                <button class="swatch" style="background:#111"     onclick="setHighlightColor('black')"  data-color="black"  title="Black"></button>
            </div>

            <div class="prop-dates">
                <span class="prop-dates-label">Date ranges</span>
                <textarea id="dateInput" placeholder="Jan 1 yellow&#10;2-5 Feb blue&#10;Mar 10-15 green&#10;1 Apr outline" oninput="parseDateInput()"></textarea>
            </div>
        </div>

        <!-- Typography -->
        <div class="prop-section">
            <div class="prop-section-head">Typography</div>
            <div class="prop-row">
                <span class="prop-label">Month color</span>
                <input type="color" id="adjMonthColor" value="#000000" oninput="applyAdvanced()">
            </div>
            <div class="prop-row">
                <span class="prop-label">Date / day pt</span>
                <div class="prop-pair">
                    <input type="number" id="adjDateSize"    step="0.5" oninput="applyAdvanced()" title="Date font">
                    <input type="number" id="adjDayNameSize" step="0.5" oninput="applyAdvanced()" title="Day name font">
                </div>
            </div>
            <div class="prop-row">
                <span class="prop-label">Month title pt</span>
                <input type="number" id="adjTitleSize" step="0.5" oninput="applyAdvanced()">
            </div>
        </div>

        <!-- Actions -->
        <div class="sidebar-actions">
            <button class="action-btn action-btn--primary"   onclick="window.print()">Print to PDF</button>
            <div class="month-only-section" style="width:100%">
                <button class="action-btn action-btn--secondary" style="width:100%" onclick="printAllMonths()">Print all 12 months</button>
            </div>
            <button class="action-btn action-btn--secondary" onclick="saveAsPng()">Save as PNG</button>
            <button class="action-btn action-btn--danger"    onclick="clearAllHighlights()">Clear all highlights</button>
        </div>
    </div>

    <div class="preview-area">
        <div class="preview-controls">
            <button onclick="zoomOut()">− Zoom out</button>
            <span id="zoomLevel">100%</span>
            <button onclick="zoomIn()">+ Zoom in</button>
            <button onclick="resetZoom()">Reset</button>
            <div id="monthNav" style="display:none; align-items:center; margin-left:8px; padding-left:12px; border-left:1px solid var(--border);">
                <span id="currentMonthDisplay" style="font-size:12px; color:var(--text); font-weight:500;"></span>
            </div>
        </div>
        <div class="preview-scroll">
            <button class="preview-nav-btn preview-nav-btn--left"  onclick="prevMonth()">‹</button>
            <button class="preview-nav-btn preview-nav-btn--right" onclick="nextMonth()">›</button>
            <div class="page" id="captureTarget">
                <div id="yearTitleHeader">2026</div>
                <div class="months-grid" id="calendar"></div>
            </div>
        </div>
    </div>
</div>

<script>
let weekStart = 1;
let highlightColor = 'yellow';
let drawMode = null;
let isMouseDown = false;
let dragTargetState = null;
let activeHighlights = {};
let zoomLevel = 1;
let viewMode = 'year';
let currentMonth = 0;

const dims = {
    'A4':     { w: 210, h: 297, unit: 'mm', dateSize: 11,  daySize: 10, titleSize: 12,  rowGap: 2, colGap: 8, cellHeight: 8,   margin: 10 },
    'A5':     { w: 148, h: 210, unit: 'mm', dateSize: 9,   daySize: 8,  titleSize: 8,   rowGap: 1, colGap: 6, cellHeight: 6,   margin: 6  },
    'A6':     { w: 105, h: 148, unit: 'mm', dateSize: 7.5, daySize: 5,  titleSize: 6.5, rowGap: 0, colGap: 3, cellHeight: 4.5, margin: 4  },
    'Square': { w: 500, h: 500, unit: 'px', dateSize: 7.5, daySize: 7.5,titleSize: 8,   rowGap: 0, colGap: 3, cellHeight: 18,  margin: 3  }
};

const monthDims = {
    'A4': {
        portrait:  { dateSize: 20, daySize: 12, titleSize: 24, cellHeight: 34, margin: 12, rowGap: 0, colGap: 0, giantTitleSize: 180 },
        landscape: { dateSize: 17, daySize: 10, titleSize: 18, cellHeight: 22, margin: 12, rowGap: 0, colGap: 0, giantTitleSize: 125 },
    },
    'A5': {
        portrait:  { dateSize: 16, daySize: 9,  titleSize: 17, cellHeight: 24, margin: 8,  rowGap: 0, colGap: 0, giantTitleSize: 130 },
        landscape: { dateSize: 13, daySize: 8,  titleSize: 13, cellHeight: 15, margin: 8,  rowGap: 0, colGap: 0, giantTitleSize: 90  },
    },
    'A6': {
        portrait:  { dateSize: 11, daySize: 7,  titleSize: 12, cellHeight: 17, margin: 6,  rowGap: 0, colGap: 0, giantTitleSize: 80  },
        landscape: { dateSize: 10, daySize: 6,  titleSize: 10, cellHeight: 11, margin: 5,  rowGap: 0, colGap: 0, giantTitleSize: 60  },
    },
    'Square': {
        portrait:  { dateSize: 14, daySize: 10, titleSize: 18, cellHeight: 48, margin: 5,  rowGap: 0, colGap: 0, giantTitleSize: 115 },
        landscape: { dateSize: 14, daySize: 10, titleSize: 18, cellHeight: 48, margin: 5,  rowGap: 0, colGap: 0, giantTitleSize: 115 },
    },
};

function zoomIn()    { zoomLevel = Math.min(zoomLevel + 0.1, 2);   updateZoom(); }
function zoomOut()   { zoomLevel = Math.max(zoomLevel - 0.1, 0.5); updateZoom(); }
function resetZoom() { zoomLevel = 1; updateZoom(); }

function updateZoom() {
    document.documentElement.style.setProperty('--zoom-level', zoomLevel);
    document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%';
}

function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
}

function setViewMode(mode) {
    viewMode = mode;
    document.body.setAttribute('data-view', mode);
    document.getElementById('btnViewYear').classList.toggle('active', mode === 'year');
    document.getElementById('btnViewMonth').classList.toggle('active', mode === 'month');
    const optFolded = document.getElementById('optFolded');
    const layoutSelect = document.getElementById('layoutSelect');
    optFolded.disabled = (mode === 'month');
    if (mode === 'month' && layoutSelect.value === 'folded') layoutSelect.value = 'portrait';
    document.getElementById('monthNav').style.display = mode === 'month' ? 'flex' : 'none';
    if (mode === 'month') {
        document.getElementById('showDayOutlines').checked = true;
    }
    updateDimensions();
}

function prevMonth() {
    currentMonth = (currentMonth + 11) % 12;
    updateMonthNav();
    render();
    updateUrl();
}

function nextMonth() {
    currentMonth = (currentMonth + 1) % 12;
    updateMonthNav();
    render();
    updateUrl();
}

function updateMonthNav() {
    const year = +document.getElementById('year').value;
    const name = new Date(year, currentMonth).toLocaleString('default', { month: 'long' });
    document.getElementById('currentMonthDisplay').textContent = name + ' ' + year;
}

function updateUrl() {
    try {
        const state = {
            y:   document.getElementById('year').value,
            mf:  document.getElementById('monthFormat').value,
            s:   document.getElementById('sizeSelect').value,
            l:   document.getElementById('layoutSelect').value,
            ws:  weekStart,
            yt:  document.getElementById('showYearTitle').checked,
            do:  document.getElementById('showDayOutlines').checked,
            mc:  document.getElementById('adjMonthColor').value,
            ds:  document.getElementById('adjDateSize').value,
            dns: document.getElementById('adjDayNameSize').value,
            ts:  document.getElementById('adjTitleSize').value,
            vm:  viewMode,
            cm:  currentMonth,
        };
        if (Object.keys(activeHighlights).length) state.h = JSON.stringify(activeHighlights);
        const params = new URLSearchParams(state);
        window.history.replaceState({}, '', '?' + params.toString());
    } catch (e) {}
}

function loadFromUrl() {
    try {
        const params = new URLSearchParams(window.location.search);
        if (params.has('y'))   document.getElementById('year').value = params.get('y');
        if (params.has('mf'))  document.getElementById('monthFormat').value = params.get('mf');
        if (params.has('s'))   document.getElementById('sizeSelect').value = params.get('s');
        if (params.has('l'))   document.getElementById('layoutSelect').value = params.get('l');
        if (params.has('ws'))  weekStart = +params.get('ws');
        if (params.has('yt'))  document.getElementById('showYearTitle').checked = params.get('yt') === 'true';
        if (params.has('do'))  document.getElementById('showDayOutlines').checked = params.get('do') === 'true';
        if (params.has('mc'))  document.getElementById('adjMonthColor').value = params.get('mc');
        if (params.has('ds'))  document.getElementById('adjDateSize').value = params.get('ds');
        if (params.has('dns')) document.getElementById('adjDayNameSize').value = params.get('dns');
        if (params.has('ts'))  document.getElementById('adjTitleSize').value = params.get('ts');
        if (params.has('h'))   activeHighlights = JSON.parse(params.get('h'));
        if (params.has('vm'))  viewMode = params.get('vm');
        if (params.has('cm'))  currentMonth = +params.get('cm');
        document.getElementById('btnMon').classList.toggle('active', weekStart === 1);
        document.getElementById('btnSun').classList.toggle('active', weekStart === 0);
        document.getElementById('btnViewYear').classList.toggle('active', viewMode === 'year');
        document.getElementById('btnViewMonth').classList.toggle('active', viewMode === 'month');
        document.body.setAttribute('data-view', viewMode);
        const optFolded = document.getElementById('optFolded');
        optFolded.disabled = (viewMode === 'month');
        if (viewMode === 'month') {
            const layoutSelect = document.getElementById('layoutSelect');
            if (layoutSelect.value === 'folded') layoutSelect.value = 'portrait';
            document.getElementById('monthNav').style.display = 'flex';
            if (!params.has('do')) document.getElementById('showDayOutlines').checked = true;
        }
    } catch (e) {}
}

function updateDimensions() {
    const size   = document.getElementById('sizeSelect').value;
    const layout = document.getElementById('layoutSelect').value;
    if (viewMode === 'month') {
        const orient = layout === 'folded' ? 'portrait' : layout;
        const preset = (monthDims[size] && monthDims[size][orient]) || monthDims[size]['portrait'];
        document.getElementById('adjDateSize').value    = preset.dateSize;
        document.getElementById('adjDayNameSize').value = preset.daySize;
        document.getElementById('adjTitleSize').value   = preset.titleSize;
    } else {
        const base = dims[size];
        document.getElementById('adjDateSize').value    = base.dateSize;
        document.getElementById('adjDayNameSize').value = base.daySize;
        document.getElementById('adjTitleSize').value   = base.titleSize;
    }
    applyAdvanced();
}

function clearAllHighlights() {
    if (confirm('Clear all highlights?')) {
        activeHighlights = {};
        document.getElementById('dateInput').value = '';
        render();
        updateUrl();
    }
}

function computeAutoSpacing(size, layout, dateSize, dayNameSize, titleSize) {
    const base   = dims[size];
    const unit   = base.unit;
    const margin = base.margin;
    const rowGap = base.rowGap;
    const colGap = base.colGap;

    if (viewMode === 'month') {
        const orient = (layout === 'landscape') ? 'landscape' : 'portrait';
        const mp = (monthDims[size] && monthDims[size][orient]) || monthDims[size]['portrait'];
        return { margin: mp.margin, rowGap: 0, colGap: 0, cellHeight: mp.cellHeight };
    }

    // Paper height in the rotated orientation
    const paperH = (layout === 'portrait') ? base.h : base.w;
    // Portrait → 4 rows; landscape / folded → 3 rows
    const gridRows = (layout === 'landscape' || layout === 'folded') ? 3 : 4;

    // Convert font pt to paper unit; margins are always mm so convert for px
    const ptConvert    = (unit === 'px') ? 1.333 : 0.353;
    const marginInUnit = (unit === 'px') ? margin * 3.78 : margin;
    const rowGapInUnit = (unit === 'px') ? rowGap * 3.78 : rowGap;

    const usableH    = paperH - 2 * marginInUnit;
    const perMonthH  = (usableH - (gridRows - 1) * rowGapInUnit) / gridRows;
    const titleH     = titleSize   * ptConvert * 1.5;
    const headerH    = dayNameSize * ptConvert * 1.5;
    const availH     = perMonthH - titleH - headerH;
    // Use 6 rows (worst-case month) with 0.88 fill factor so every month fits
    const cellHeight = Math.max((availH * 0.88) / 6, dateSize * ptConvert * 1.1);

    return { margin, rowGap, colGap, cellHeight };
}

function applyAdvanced() {
    const size   = document.getElementById('sizeSelect').value;
    const layout = document.getElementById('layoutSelect').value;
    const unit   = dims[size].unit;
    const year   = document.getElementById('year').value;
    const header = document.getElementById('yearTitleHeader');
    header.textContent = year;
    header.style.display = (viewMode === 'month' || !document.getElementById('showYearTitle').checked) ? 'none' : 'block';
    const mc = document.getElementById('adjMonthColor').value;
    const cr = parseInt(mc.slice(1,3),16), cg = parseInt(mc.slice(3,5),16), cb = parseInt(mc.slice(5,7),16);
    document.documentElement.style.setProperty('--grid-color', `rgba(${cr},${cg},${cb},0.2)`);
    document.documentElement.style.setProperty('--grid-display',
        document.getElementById('showDayOutlines').checked ? '0.3pt solid var(--grid-color)' : 'none');
    const base = dims[size];
    let width, height;
    const effectiveLayout = (viewMode === 'month' && layout === 'folded') ? 'portrait' : layout;
    if (effectiveLayout === 'portrait') {
        width = base.w; height = base.h;
        document.documentElement.style.setProperty('--orientation', 'portrait');
    } else {
        width = base.h; height = base.w;
        document.documentElement.style.setProperty('--orientation', 'landscape');
    }
    const root = document.documentElement;
    root.style.setProperty('--paper-width',      width + unit);
    root.style.setProperty('--paper-height',     height + unit);
    const dateSize    = parseFloat(document.getElementById('adjDateSize').value);
    const dayNameSize = parseFloat(document.getElementById('adjDayNameSize').value);
    const titleSize   = parseFloat(document.getElementById('adjTitleSize').value);
    root.style.setProperty('--date-font-size',   dateSize    + 'pt');
    root.style.setProperty('--day-name-size',    dayNameSize + 'pt');
    root.style.setProperty('--month-title-size', titleSize   + 'pt');
    const spacing = computeAutoSpacing(size, layout, dateSize, dayNameSize, titleSize);
    root.style.setProperty('--month-gap-row',  spacing.rowGap    + 'mm');
    root.style.setProperty('--month-gap-col',  spacing.colGap    + 'mm');
    root.style.setProperty('--cell-height',    spacing.cellHeight + unit);
    root.style.setProperty('--paper-padding',  spacing.margin    + 'mm');
    root.style.setProperty('--month-color',      document.getElementById('adjMonthColor').value);
    if (viewMode === 'month') {
        const effectiveOrient = effectiveLayout === 'landscape' ? 'landscape' : 'portrait';
        const mp = (monthDims[size] && monthDims[size][effectiveOrient]) || monthDims[size]['portrait'];
        root.style.setProperty('--month-giant-size', mp.giantTitleSize + 'pt');
    } else {
        root.style.setProperty('--month-giant-size', '0pt');
    }
    document.body.setAttribute('data-layout', layout);
    render();
    updateUrl();
}

function setWeekStart(val) {
    weekStart = val;
    document.getElementById('btnMon').classList.toggle('active', val === 1);
    document.getElementById('btnSun').classList.toggle('active', val === 0);
    render();
    updateUrl();
}

function buildMonthViewHeader(year, m) {
    const mvh = document.createElement('div');
    mvh.className = 'mvh';

    const monthFormat = document.getElementById('monthFormat').value;
    const nameDiv = document.createElement('div');
    nameDiv.className = 'mvh-name';
    nameDiv.textContent = new Date(year, m).toLocaleString('default', { month: monthFormat }).toUpperCase();
    mvh.appendChild(nameDiv);

    const showYear = document.getElementById('showYearTitle').checked;
    if (showYear) {
        const side = document.createElement('div');
        side.className = 'mvh-side';
        const yearEl = document.createElement('div');
        yearEl.className = 'mvh-year-text';
        yearEl.textContent = year;
        side.appendChild(yearEl);
        mvh.appendChild(side);
    }

    return mvh;
}

function render() {
    const year        = +document.getElementById('year').value;
    const monthFormat = document.getElementById('monthFormat').value;
    const cal         = document.getElementById('calendar');
    cal.innerHTML = '';

    if (viewMode === 'month') updateMonthNav();

    const months = viewMode === 'month' ? [currentMonth] : Array.from({length: 12}, (_, i) => i);
    for (const m of months) {
        const monthDiv = document.createElement('div');
        monthDiv.className = 'month';
        if (viewMode === 'month') {
            monthDiv.appendChild(buildMonthViewHeader(year, m));
        } else {
            const name = new Date(year, m).toLocaleString('default', { month: monthFormat }).toUpperCase();
            monthDiv.innerHTML = `<h3>${name}</h3>`;
        }
        const table = document.createElement('table');
        const days = ['S','M','T','W','T','F','S'];
        let headHtml = '<tr>';
        for (let i = 0; i < 7; i++) headHtml += `<th>${days[(i + weekStart) % 7]}</th>`;
        table.innerHTML = headHtml + '</tr>';

        let date = new Date(year, m, 1);
        let row  = document.createElement('tr');
        const leadingCount = (date.getDay() - weekStart + 7) % 7;
        const showAdjacent = viewMode === 'month';
        if (showAdjacent && leadingCount > 0) {
            const prevLast = new Date(year, m, 0).getDate();
            for (let i = leadingCount - 1; i >= 0; i--) {
                const td = document.createElement('td');
                td.className = 'overflow-date';
                td.innerHTML = `<span>${prevLast - i}</span>`;
                row.appendChild(td);
            }
        } else {
            for (let i = 0; i < leadingCount; i++) row.appendChild(document.createElement('td'));
        }

        while (date.getMonth() === m) {
            const currentDay = date.getDate();
            const td  = document.createElement('td');
            const key = `${year}-${m}-${currentDay}`;
            td.dataset.key = key;
            td.innerHTML = `<span>${currentDay}</span>`;

            if (activeHighlights[key]) {
                const hType     = activeHighlights[key];
                const dayInWeek = date.getDay();
                const prevDate  = new Date(year, m, currentDay - 1);
                const nextDate  = new Date(year, m, currentDay + 1);
                const prevKey   = `${prevDate.getFullYear()}-${prevDate.getMonth()}-${prevDate.getDate()}`;
                const nextKey   = `${nextDate.getFullYear()}-${nextDate.getMonth()}-${nextDate.getDate()}`;

                if (hType === 'outline') {
                    td.classList.add('outline');
                    const hasPrev = (dayInWeek !== weekStart) && activeHighlights[prevKey] === 'outline';
                    const hasNext = (dayInWeek !== (weekStart + 6) % 7) && activeHighlights[nextKey] === 'outline';
                    if (!hasPrev && !hasNext) td.classList.add('round-all');
                    else if (!hasPrev && hasNext) td.classList.add('round-left');
                    else if (hasPrev && !hasNext) td.classList.add('round-right');
                } else {
                    td.classList.add(`highlight-${hType}`);
                    const hasPrev = (dayInWeek !== weekStart) && activeHighlights[prevKey] === hType;
                    const hasNext = (dayInWeek !== (weekStart + 6) % 7) && activeHighlights[nextKey] === hType;
                    if (!hasPrev && !hasNext) td.classList.add('round-all');
                    else if (!hasPrev && hasNext) td.classList.add('round-left');
                    else if (hasPrev && !hasNext) td.classList.add('round-right');
                }
            }

            td.onpointerdown = (e) => {
                if (!drawMode) return;
                isMouseDown = true;
                td.releasePointerCapture(e.pointerId);
                dragTargetState = !isCellMarked(td);
                toggleCell(td, dragTargetState, false);
            };
            td.onpointerenter = () => { if (isMouseDown) toggleCell(td, dragTargetState, false); };
            row.appendChild(td);
            if (row.children.length === 7) { table.appendChild(row); row = document.createElement('tr'); }
            date.setDate(date.getDate() + 1);
        }
        if (showAdjacent && row.children.length > 0 && row.children.length < 7) {
            let nextDay = 1;
            while (row.children.length < 7) {
                const td = document.createElement('td');
                td.className = 'overflow-date';
                td.innerHTML = `<span>${nextDay++}</span>`;
                row.appendChild(td);
            }
        }
        table.appendChild(row);
        monthDiv.appendChild(table);
        cal.appendChild(monthDiv);
    }
}

function toggleCell(td, forceState, fullRender = true) {
    const key = td.dataset.key;
    if (drawMode === 'highlight') {
        td.classList.remove('highlight-yellow','highlight-blue','highlight-pink','highlight-green','highlight-grey','highlight-black','outline','round-all','round-left','round-right');
        if (forceState) { td.classList.add(`highlight-${highlightColor}`); activeHighlights[key] = highlightColor; }
        else { delete activeHighlights[key]; }
    } else if (drawMode === 'outline') {
        td.classList.remove('highlight-yellow','highlight-blue','highlight-pink','highlight-green','highlight-grey','highlight-black','outline','round-all','round-left','round-right');
        if (forceState) { td.classList.add('outline'); activeHighlights[key] = 'outline'; }
        else { delete activeHighlights[key]; }
    }
    if (fullRender) { render(); updateTextareaFromHighlights(); }
    updateUrl();
}

let isUpdatingFromTextarea = false;

function parseDateInput() {
    if (isUpdatingFromTextarea) return;
    const textarea = document.getElementById('dateInput');
    const input    = textarea.value.replace(/lime/g, 'green');
    const year     = +document.getElementById('year').value;
    activeHighlights = {};
    const monthNames = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const regex = /([\d\-]+)\s+([a-z]{3})(?:\s*-\s*(\d+)\s+([a-z]{3}))?\s+([a-z]+)/gi;
    let match;
    while ((match = regex.exec(input)) !== null) {
        const [, dayPart, startMonthName, endDay, endMonthName, color] = match;
        const startMonth = monthNames.indexOf(startMonthName.toLowerCase().substring(0, 3));
        if (startMonth === -1) continue;
        if (endMonthName) {
            const endMonth = monthNames.indexOf(endMonthName.toLowerCase().substring(0, 3));
            if (endMonth === -1) continue;
            const startDate = new Date(year, startMonth, parseInt(dayPart));
            const endDate   = new Date(year, endMonth, parseInt(endDay));
            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1))
                activeHighlights[`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`] = color;
        } else if (dayPart.includes('-')) {
            const [start, end] = dayPart.split('-').map(Number);
            for (let day = start; day <= end; day++)
                activeHighlights[`${year}-${startMonth}-${day}`] = color;
        } else {
            activeHighlights[`${year}-${startMonth}-${parseInt(dayPart)}`] = color;
        }
    }
    render();
    updateUrl();
}

function updateTextareaFromHighlights() {
    isUpdatingFromTextarea = true;
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const sortedKeys = Object.keys(activeHighlights).sort((a, b) => {
        const [y1,m1,d1] = a.split('-').map(Number);
        const [y2,m2,d2] = b.split('-').map(Number);
        return new Date(y1,m1,d1) - new Date(y2,m2,d2);
    });
    if (sortedKeys.length === 0) {
        document.getElementById('dateInput').value = '';
        isUpdatingFromTextarea = false;
        return;
    }
    const lines = [];
    let i = 0;
    while (i < sortedKeys.length) {
        const startKey = sortedKeys[i];
        const color    = activeHighlights[startKey];
        let endKey = startKey;
        let j = i + 1;
        while (j < sortedKeys.length) {
            const currentKey = sortedKeys[j];
            const prevKey    = sortedKeys[j - 1];
            const [yC,mC,dC] = currentKey.split('-').map(Number);
            const [yP,mP,dP] = prevKey.split('-').map(Number);
            const diffDays = (new Date(yC,mC,dC) - new Date(yP,mP,dP)) / 86400000;
            if (activeHighlights[currentKey] === color && diffDays === 1) { endKey = currentKey; j++; }
            else break;
        }
        const [,mS,dS] = startKey.split('-').map(Number);
        const [,mE,dE] = endKey.split('-').map(Number);
        if (startKey === endKey) lines.push(`${dS} ${monthNames[mS]} ${color}`);
        else if (mS === mE)     lines.push(`${dS}-${dE} ${monthNames[mS]} ${color}`);
        else                    lines.push(`${dS} ${monthNames[mS]}-${dE} ${monthNames[mE]} ${color}`);
        i = j;
    }
    document.getElementById('dateInput').value = lines.join('\n');
    isUpdatingFromTextarea = false;
}

function isCellMarked(td) {
    if (drawMode === 'highlight') return td.classList.contains(`highlight-${highlightColor}`);
    return td.classList.contains('outline');
}

function setDrawMode(mode) {
    if (drawMode === mode) {
        drawMode = null;
        document.body.removeAttribute('data-active-mode');
    } else {
        drawMode = mode;
        document.body.setAttribute('data-active-mode', mode);
        if (mode === 'highlight') document.body.setAttribute('data-highlight-color', highlightColor);
    }
    document.getElementById('btnHighlight').classList.toggle('active', drawMode === 'highlight');
    document.getElementById('btnOutline').classList.toggle('active', drawMode === 'outline');
}

function setHighlightColor(color) {
    highlightColor = color;
    if (drawMode === 'highlight') document.body.setAttribute('data-highlight-color', color);
    document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === color));
}

function printAllMonths() {
    if (viewMode !== 'month') return;
    const savedMonth = currentMonth;
    const previewScroll = document.querySelector('.preview-scroll');
    const mainPage     = document.getElementById('captureTarget');
    const cal          = document.getElementById('calendar');
    const tempPages    = [];

    for (let m = 0; m < 12; m++) {
        currentMonth = m;
        render();

        const page = document.createElement('div');
        page.className = 'page month-print-page';

        const grid = document.createElement('div');
        grid.className = 'months-grid';
        grid.innerHTML = cal.innerHTML;
        page.appendChild(grid);
        previewScroll.insertBefore(page, mainPage);
        tempPages.push(page);
    }

    currentMonth = savedMonth;
    render();

    document.body.classList.add('print-all-months');
    window.print();
    document.body.classList.remove('print-all-months');
    tempPages.forEach(p => p.remove());
}

function saveAsPng() {
    const target = document.getElementById('captureTarget');
    const year   = document.getElementById('year').value;
    document.body.classList.add('is-capturing');
    let filename;
    if (viewMode === 'month') {
        const monthName = new Date(year, currentMonth).toLocaleString('default', { month: 'long' }).toLowerCase();
        filename = `calendar-${year}-${monthName}.png`;
    } else {
        filename = `calendar-${year}.png`;
    }
    setTimeout(() => {
        html2canvas(target, { scale: 3, useCORS: true, backgroundColor: null }).then(canvas => {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL();
            link.click();
            document.body.classList.remove('is-capturing');
        });
    }, 50);
}

window.addEventListener('pointerup', () => {
    if (isMouseDown) {
        isMouseDown = false;
        dragTargetState = null;
        render();
        updateTextareaFromHighlights();
    }
});

loadFromUrl();
updateDimensions();
updateTextareaFromHighlights();
</script>
